<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="Pretendard, -apple-system, sans-serif">
  <rect width="900" height="560" fill="#FFFCFB"/>

  <!-- Clients -->
  <rect x="60" y="24" width="110" height="32" rx="6" fill="#2C3E50"/>
  <text x="115" y="45" font-size="11.5" fill="#fff" text-anchor="middle" font-weight="600">손님 (테이블)</text>
  <rect x="395" y="24" width="110" height="32" rx="6" fill="#2C3E50"/>
  <text x="450" y="45" font-size="11.5" fill="#fff" text-anchor="middle" font-weight="600">점주</text>
  <rect x="730" y="24" width="110" height="32" rx="6" fill="#2C3E50"/>
  <text x="785" y="45" font-size="11.5" fill="#fff" text-anchor="middle" font-weight="600">주방</text>

  <path d="M115 56 L400 92" stroke="#94A3B8" stroke-width="1.3" marker-end="url(#c)"/>
  <path d="M450 56 L450 92" stroke="#94A3B8" stroke-width="1.3" marker-end="url(#c)"/>
  <path d="M785 56 L500 92" stroke="#94A3B8" stroke-width="1.3" marker-end="url(#c)"/>
  <text x="620" y="78" font-size="9.5" fill="#94A3B8" text-anchor="middle">WebSocket / STOMP</text>

  <!-- Ingress -->
  <rect x="350" y="98" width="200" height="36" rx="6" fill="#fff" stroke="#009639" stroke-width="2"/>
  <text x="450" y="121" font-size="12.5" fill="#00722C" text-anchor="middle" font-weight="600">nginx Ingress</text>

  <!-- EKS 경계 -->
  <rect x="30" y="152" width="840" height="180" rx="10" fill="none" stroke="#E85D3D" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.5"/>
  <text x="46" y="173" font-size="11" fill="#E85D3D" font-weight="600" letter-spacing="1">AWS EKS · 동일 인스턴스 복제본 ×3</text>

  <path d="M450 134 L155 190" stroke="#94A3B8" stroke-width="1.3" marker-end="url(#c)"/>
  <path d="M450 134 L450 190" stroke="#94A3B8" stroke-width="1.3" marker-end="url(#c)"/>
  <path d="M450 134 L745 190" stroke="#94A3B8" stroke-width="1.3" marker-end="url(#c)"/>

  <!-- Pods -->
  <rect x="70" y="196" width="170" height="64" rx="6" fill="#FDEEE9" stroke="#E85D3D" stroke-width="1.5"/>
  <text x="155" y="217" font-size="12.5" fill="#A63409" text-anchor="middle" font-weight="700">Pod 1</text>
  <text x="155" y="234" font-size="10" fill="#8F6055" text-anchor="middle">Spring Boot (모놀리식)</text>
  <text x="155" y="250" font-size="9.5" fill="#B87A68" text-anchor="middle">STOMP 세션 (in-memory)</text>

  <rect x="365" y="196" width="170" height="64" rx="6" fill="#FDEEE9" stroke="#E85D3D" stroke-width="1.5"/>
  <text x="450" y="217" font-size="12.5" fill="#A63409" text-anchor="middle" font-weight="700">Pod 2</text>
  <text x="450" y="234" font-size="10" fill="#8F6055" text-anchor="middle">Spring Boot (모놀리식)</text>
  <text x="450" y="250" font-size="9.5" fill="#B87A68" text-anchor="middle">STOMP 세션 (in-memory)</text>

  <rect x="660" y="196" width="170" height="64" rx="6" fill="#FDEEE9" stroke="#E85D3D" stroke-width="1.5"/>
  <text x="745" y="217" font-size="12.5" fill="#A63409" text-anchor="middle" font-weight="700">Pod 3</text>
  <text x="745" y="234" font-size="10" fill="#8F6055" text-anchor="middle">Spring Boot (모놀리식)</text>
  <text x="745" y="250" font-size="9.5" fill="#B87A68" text-anchor="middle">STOMP 세션 (in-memory)</text>

  <!-- Kafka fan-out (양방향) -->
  <path d="M155 260 L155 288" stroke="#231F20" stroke-width="1.8" marker-end="url(#d)"/>
  <path d="M745 260 L745 288" stroke="#231F20" stroke-width="1.8" marker-end="url(#d)"/>
  <path d="M420 294 L420 266" stroke="#231F20" stroke-width="1.8" marker-end="url(#d)"/>
  <path d="M480 294 L480 266" stroke="#231F20" stroke-width="1.8" marker-end="url(#d)"/>

  <rect x="230" y="294" width="440" height="30" rx="5" fill="#F1F5F9" stroke="#231F20" stroke-width="1.5"/>
  <text x="450" y="314" font-size="11.5" fill="#231F20" text-anchor="middle" font-weight="700">Kafka — 모든 Pod이 Consumer로 수신 후 각자 STOMP 세션에 fan-out</text>

  <!-- 문제/해결 대비 -->
  <rect x="30" y="352" width="410" height="86" rx="8" fill="#FDF2F2" stroke="#DC2626" stroke-width="1.2"/>
  <text x="48" y="374" font-size="11" fill="#DC2626" font-weight="700">✕ SimpleBroker (기각)</text>
  <text x="48" y="395" font-size="10.5" fill="#7F1D1D">STOMP 세션이 Pod 메모리에 묶임</text>
  <text x="48" y="413" font-size="10.5" fill="#7F1D1D">→ Pod 1 손님이 Pod 2 발행 메시지를 못 받음</text>
  <text x="48" y="429" font-size="10" fill="#B45454">수평 확장의 구조적 한계 (코드 버그 아님)</text>

  <rect x="460" y="352" width="410" height="86" rx="8" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.2"/>
  <text x="478" y="374" font-size="11" fill="#16A34A" font-weight="700">✓ Kafka fan-out (채택)</text>
  <text x="478" y="395" font-size="10.5" fill="#14532D">발행 Pod과 무관하게 전 Pod이 구독</text>
  <text x="478" y="413" font-size="10.5" fill="#14532D">→ 각 Pod이 자기 세션에만 전달</text>
  <text x="478" y="429" font-size="10" fill="#4D7C5A">Pod 수와 무관하게 동작</text>

  <!-- Data -->
  <rect x="230" y="466" width="200" height="36" rx="6" fill="#fff" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="330" y="489" font-size="11.5" fill="#334155" text-anchor="middle" font-weight="600">MySQL 8</text>
  <rect x="470" y="466" width="200" height="36" rx="6" fill="#fff" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="570" y="489" font-size="11.5" fill="#334155" text-anchor="middle" font-weight="600">Redis 7 (멱등성 키 · 캐시)</text>

  <defs>
    <marker id="c" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 1 L7 4 L0 7" fill="none" stroke="#94A3B8" stroke-width="1.3"/>
    </marker>
    <marker id="d" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 1 L7 4 L0 7" fill="none" stroke="#231F20" stroke-width="1.5"/>
    </marker>
  </defs>
</svg>
