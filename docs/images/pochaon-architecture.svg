<svg viewBox="0 0 920 620" xmlns="http://www.w3.org/2000/svg" font-family="Pretendard, -apple-system, BlinkMacSystemFont, sans-serif">
  <rect width="920" height="620" fill="#FFFCFB"/>

  <!-- ===== BAND 1: Clients ===== -->
  <rect x="0" y="0" width="920" height="76" fill="#F7F4F3"/>

  <rect x="90" y="18" width="150" height="40" rx="8" fill="#2C3E50"/>
