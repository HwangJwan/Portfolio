    <path d="M0 11 L10 16 L20 11" fill="none" stroke="#FF4438" stroke-width="2"/>
    <path d="M0 17 L10 22 L20 17" fill="none" stroke="#FF4438" stroke-width="2"/>
  </g>
  <text x="540" y="563" font-size="12.5" fill="#C4362D" font-weight="700">Redis 7</text>
  <text x="540" y="579" font-size="9.5" fill="#E08078">멱등성 키 · 중복 요청 차단</text>

  <defs>
    <marker id="g2" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0 1 L8 4.5 L0 8" fill="none" stroke="#B0BEC5" stroke-width="1.8"/>
    </marker>
    <marker id="k2" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0 1 L8 4.5 L0 8" fill="none" stroke="#231F20" stroke-width="2"/>
    </marker>
  </defs>
</svg>
