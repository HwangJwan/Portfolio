    <rect x="0" y="0" width="14" height="20" rx="2.5" fill="none" stroke="#fff" stroke-width="1.8"/>
    <line x1="4" y1="16.5" x2="10" y2="16.5" stroke="#fff" stroke-width="1.5"/>
  </g>
  <text x="132" y="43" font-size="13" fill="#fff" font-weight="600">손님 · 테이블</text>

  <rect x="385" y="18" width="150" height="40" rx="8" fill="#2C3E50"/>
  <g transform="translate(403,29)">
    <rect x="0" y="2" width="20" height="14" rx="2" fill="none" stroke="#fff" stroke-width="1.8"/>
    <line x1="7" y1="19" x2="13" y2="19" stroke="#fff" stroke-width="1.8"/>
  </g>
  <text x="431" y="43" font-size="13" fill="#fff" font-weight="600">점주</text>

  <rect x="680" y="18" width="150" height="40" rx="8" fill="#2C3E50"/>
  <g transform="translate(698,28)">
    <path d="M2 20 L2 8 M8 20 L8 2 M8 8 L2 8 M14 20 C14 20 14 10 14 8 C14 4 17 2 17 2 L17 20" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
  </g>
  <text x="726" y="43" font-size="13" fill="#fff" font-weight="600">주방</text>

  <path d="M165 58 L420 100" stroke="#B0BEC5" stroke-width="2" marker-end="url(#g2)"/>
  <path d="M460 58 L460 100" stroke="#B0BEC5" stroke-width="2" marker-end="url(#g2)"/>
  <path d="M755 58 L500 100" stroke="#B0BEC5" stroke-width="2" marker-end="url(#g2)"/>
  <text x="620" y="84" font-size="10.5" fill="#94A3B8" text-anchor="middle" font-weight="600">WebSocket / STOMP</text>

  <!-- ===== BAND 2: Ingress ===== -->
  <rect x="330" y="100" width="260" height="44" rx="8" fill="#fff" stroke="#009639" stroke-width="2.5"/>
  <g transform="translate(354,111)">
    <path d="M0 21 L0 4 L15 21 L15 4" fill="none" stroke="#009639" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <text x="386" y="128" font-size="14" fill="#00722C" font-weight="700">nginx Ingress</text>

  <!-- ===== BAND 3: EKS Pods ===== -->
  <rect x="26" y="172" width="868" height="126" rx="12" fill="#FEF6F3" stroke="#E85D3D" stroke-width="1.5" stroke-dasharray="7 5"/>
  <g transform="translate(44,188)">
    <path d="M9 0 L18 5 L16 15 L9 19 L2 15 L0 5 Z" fill="none" stroke="#E85D3D" stroke-width="1.8"/>
    <path d="M9 5 L13 7.5 L12 13 L9 15 L6 13 L5 7.5 Z" fill="#E85D3D"/>
  </g>
  <text x="70" y="203" font-size="12" fill="#E85D3D" font-weight="700" letter-spacing="0.5">AWS EKS · 모놀리식 애플리케이션의 동일 복제본 ×3</text>

  <path d="M460 144 L155 224" stroke="#B0BEC5" stroke-width="2" marker-end="url(#g2)"/>
  <path d="M460 144 L460 224" stroke="#B0BEC5" stroke-width="2" marker-end="url(#g2)"/>
  <path d="M460 144 L765 224" stroke="#B0BEC5" stroke-width="2" marker-end="url(#g2)"/>

  <!-- Pod 1 -->
  <rect x="55" y="224" width="200" height="60" rx="8" fill="#fff" stroke="#E85D3D" stroke-width="2"/>
  <g transform="translate(70,238)">
    <path d="M11 0 C4 5 0 10 0 15 C0 20 5 23 11 23 C17 23 22 20 22 15 C22 10 18 5 11 0 Z" fill="#6DB33F"/>
  </g>
  <text x="102" y="248" font-size="13.5" fill="#A63409" font-weight="700">Pod 1</text>
  <text x="102" y="263" font-size="9.5" fill="#8F6055">Spring Boot · 모놀리식</text>
  <text x="102" y="276" font-size="9" fill="#C09080">STOMP 세션 (in-memory)</text>

  <!-- Pod 2 -->
  <rect x="360" y="224" width="200" height="60" rx="8" fill="#fff" stroke="#E85D3D" stroke-width="2"/>
  <g transform="translate(375,238)">
    <path d="M11 0 C4 5 0 10 0 15 C0 20 5 23 11 23 C17 23 22 20 22 15 C22 10 18 5 11 0 Z" fill="#6DB33F"/>
  </g>
  <text x="407" y="248" font-size="13.5" fill="#A63409" font-weight="700">Pod 2</text>
  <text x="407" y="263" font-size="9.5" fill="#8F6055">Spring Boot · 모놀리식</text>
  <text x="407" y="276" font-size="9" fill="#C09080">STOMP 세션 (in-memory)</text>

  <!-- Pod 3 -->
  <rect x="665" y="224" width="200" height="60" rx="8" fill="#fff" stroke="#E85D3D" stroke-width="2"/>
  <g transform="translate(680,238)">
    <path d="M11 0 C4 5 0 10 0 15 C0 20 5 23 11 23 C17 23 22 20 22 15 C22 10 18 5 11 0 Z" fill="#6DB33F"/>
  </g>
  <text x="712" y="248" font-size="13.5" fill="#A63409" font-weight="700">Pod 3</text>
  <text x="712" y="263" font-size="9.5" fill="#8F6055">Spring Boot · 모놀리식</text>
  <text x="712" y="276" font-size="9" fill="#C09080">STOMP 세션 (in-memory)</text>

  <!-- ===== BAND 4: Kafka fan-out (양방향) ===== -->
  <path d="M130 284 L130 322" stroke="#231F20" stroke-width="2.2" marker-end="url(#k2)"/>
  <path d="M180 322 L180 284" stroke="#231F20" stroke-width="2.2" marker-end="url(#k2)"/>
  <path d="M435 284 L435 322" stroke="#231F20" stroke-width="2.2" marker-end="url(#k2)"/>
  <path d="M485 322 L485 284" stroke="#231F20" stroke-width="2.2" marker-end="url(#k2)"/>
  <path d="M740 284 L740 322" stroke="#231F20" stroke-width="2.2" marker-end="url(#k2)"/>
  <path d="M790 322 L790 284" stroke="#231F20" stroke-width="2.2" marker-end="url(#k2)"/>

  <rect x="55" y="322" width="810" height="52" rx="8" fill="#F5F5F4" stroke="#231F20" stroke-width="2.5"/>
  <g transform="translate(78,336)">
    <circle cx="4" cy="5" r="3.5" fill="#231F20"/>
    <circle cx="4" cy="21" r="3.5" fill="#231F20"/>
    <circle cx="17" cy="13" r="4.5" fill="#231F20"/>
    <path d="M6 7 L14 11 M6 19 L14 15" stroke="#231F20" stroke-width="1.8"/>
  </g>
  <text x="112" y="343" font-size="13.5" fill="#231F20" font-weight="700">Kafka</text>
  <text x="112" y="360" font-size="11" fill="#57534E">모든 Pod이 Consumer로 수신 → 각자의 STOMP 세션에 fan-out</text>
  <text x="845" y="353" font-size="10" fill="#78716C" text-anchor="end" font-weight="600">concurrency = 1</text>

  <!-- ===== BAND 5: 기각 vs 채택 ===== -->
  <rect x="26" y="402" width="424" height="112" rx="10" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5"/>
  <g transform="translate(46,416)">
    <circle cx="8" cy="8" r="8" fill="#DC2626"/>
    <path d="M5 5 L11 11 M11 5 L5 11" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="72" y="430" font-size="12.5" fill="#DC2626" font-weight="700">SimpleBroker · 기각</text>
  <text x="46" y="454" font-size="11" fill="#7F1D1D">STOMP 세션이 Pod 메모리에 묶임</text>
  <text x="46" y="474" font-size="11" fill="#7F1D1D">→ Pod 1 손님이 Pod 2 발행 메시지를 못 받음</text>
  <text x="46" y="497" font-size="10" fill="#B45454" font-style="italic">코드 버그가 아니라 수평 확장의 구조적 한계</text>

  <rect x="470" y="402" width="424" height="112" rx="10" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5"/>
  <g transform="translate(490,416)">
    <circle cx="8" cy="8" r="8" fill="#16A34A"/>
    <path d="M4.5 8 L7 10.5 L11.5 5.5" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="516" y="430" font-size="12.5" fill="#16A34A" font-weight="700">Kafka fan-out · 채택</text>
  <text x="490" y="454" font-size="11" fill="#14532D">발행 Pod과 무관하게 전 Pod이 구독</text>
  <text x="490" y="474" font-size="11" fill="#14532D">→ 각 Pod이 자기 세션에만 전달</text>
  <text x="490" y="497" font-size="10" fill="#4D7C5A" font-style="italic">Pod 수와 무관하게 동작</text>

  <!-- ===== BAND 6: Data ===== -->
  <rect x="250" y="540" width="180" height="52" rx="8" fill="#fff" stroke="#4479A1" stroke-width="2"/>
  <g transform="translate(268,552)">
    <ellipse cx="10" cy="4" rx="10" ry="4" fill="#4479A1"/>
    <path d="M0 4 L0 20 C0 22.5 4.5 24 10 24 C15.5 24 20 22.5 20 20 L20 4" fill="none" stroke="#4479A1" stroke-width="2"/>
    <path d="M0 12 C0 14.5 4.5 16 10 16 C15.5 16 20 14.5 20 12" fill="none" stroke="#4479A1" stroke-width="1.5"/>
  </g>
  <text x="300" y="563" font-size="12.5" fill="#2C5372" font-weight="700">MySQL 8</text>
  <text x="300" y="579" font-size="9.5" fill="#7796AC">비관적 락 · 재고 정합성</text>

  <rect x="490" y="540" width="180" height="52" rx="8" fill="#fff" stroke="#FF4438" stroke-width="2"/>
  <g transform="translate(508,553)">
