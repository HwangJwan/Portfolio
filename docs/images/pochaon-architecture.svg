<!-- ===== 기각 vs 채택 ===== -->
<g transform="translate(40,448)">
  <rect x="0" y="0" width="440" height="106" rx="10" fill="#FEF2F2" stroke="#DC2626" stroke-width="2"/>
  <g transform="translate(20,16)">
    <circle cx="9" cy="9" r="9" fill="#DC2626"/>
    <path d="M5.5 5.5 L12.5 12.5 M12.5 5.5 L5.5 12.5" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <text x="50" y="30" font-size="12.5" fill="#DC2626" font-weight="700">SimpleBroker · 기각</text>
  <text x="20" y="56" font-size="11" fill="#7F1D1D">STOMP 세션이 Pod 메모리에 묶임</text>
  <text x="20" y="76" font-size="11" fill="#7F1D1D">→ Pod 1 손님이 Pod 2 발행 메시지를 못 받음</text>
  <text x="20" y="95" font-size="9.5" fill="#B45454" font-style="italic">코드 버그가 아니라 수평 확장의 구조적 한계</text>
</g>

<g transform="translate(500,448)">
  <rect x="0" y="0" width="420" height="106" rx="10" fill="#F0FDF4" stroke="#16A34A" stroke-width="2"/>
  <g transform="translate(20,16)">
    <circle cx="9" cy="9" r="9" fill="#16A34A"/>
    <path d="M5 9 L8 12 L13 6" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="50" y="30" font-size="12.5" fill="#16A34A" font-weight="700">Kafka fan-out · 채택</text>
  <text x="20" y="56" font-size="11" fill="#14532D">발행 Pod과 무관하게 전 Pod이 구독</text>
  <text x="20" y="76" font-size="11" fill="#14532D">→ 각 Pod이 자기 세션에만 전달</text>
  <text x="20" y="95" font-size="9.5" fill="#4D7C5A" font-style="italic">Pod 수와 무관하게 동작</text>
</g>

